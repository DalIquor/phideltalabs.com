<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Curvature Labs UG</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: "Futura PT", "Futura", "Avenir Next", "Avenir",
                     "Montserrat", "Poppins", "Helvetica Neue", sans-serif;
        height: 100vh;
        overflow: hidden;
    }

    /* Hintergrund-Logo */
    .bg-logo {
        position: fixed;
	background-image: url("logo_curvature_labs_inverse.jpg");
 	background-size: contain; /* oder cover */ 
	background-repeat: no-repeat; 
	background-position: center;
        inset: 0;
        z-index: 0;
        opacity: 0.16;
        pointer-events: none;
    }

    /* Content */
    .content {
        position: relative;
        z-index: 10;
        padding: 6rem;
        max-width: 900px;
    }

    h1, h2 {
        margin: 0;
        font-weight: 300;
        letter-spacing: 0.03em;
    }

    h1 {
        font-size: 3rem;
    }

    h2 {
        font-size: 1.4rem;
        margin-top: 0.3rem;
        opacity: 0.7;
    }

    .contact {
        margin-top: 3rem;
        line-height: 1.6;
        font-size: 1.1rem;
        opacity: 0.85;
    }

    .person {
        margin-top: 3rem;
        font-size: 1.2rem;
        line-height: 1.5;
    }

    .role {
        opacity: 0.7;
        font-size: 1rem;
    }
</style>
</head>

<body>

<!-- Hintergrund -->
<div class="bg-logo">
    </div>

<!-- Vordergrund-Content -->
<div class="content">
    <h1>Phi Delta Labs UG</h1>
    <h2>Systems Consulting</h2>

	<h2>„Wir schaffen Struktur, wo Komplexität dominiert.“</h2>
    <div class="contact">

    </div>

    <div class="person">
        Sven A. Laddach<br>
        <span class="role">CEO &amp; systems.whisperer</span>
    </div>
</div>

</body>
</html>
